display_name: Work Loop
short_description: Auto-initialize a coding harness, approve a task plan, then execute dependency-aware tasks safely.
default_prompt: Use the work-loop skill. Auto-check the current project and create missing harness files without overwriting existing files. Populate architecture.md and task.json from my requirement, list the task overview for approval, then wait. After approval, execute tasks by dependency in checkpoint, continue, or automation mode, updating task.json and progress.md after every completed task.
