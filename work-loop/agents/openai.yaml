display_name: Work Loop
short_description: Split harness initialization from dependency-aware task execution.
default_prompt: Use the work-loop skill. First run the initialization/planning workflow: create missing harness files without overwriting existing files, tailor init.sh as project-specific prerequisite checks, populate architecture.md and task.json, list the task overview, and wait for approval. After approval, use the separate task execution workflow by dependency in checkpoint, continuous-batch, or automation-loop mode. A task is not complete until task.json has passes true for that task and progress.md has a matching verification entry. When updating passes, change only "passes": false to "passes": true — do not rewrite any other part of task.json.
